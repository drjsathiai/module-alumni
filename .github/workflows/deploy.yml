name: Deploy Alumni Module

on:
  push:
    branches: [ main, master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Deploy to VPS via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.HOST }}
        username: root
        key: ${{ secrets.SSH_KEY }}
        command_timeout: 5m
        script: |
          set -e
          # 1. Enter the Alumni module folder
          cd /root/gibbon-erp/gibbon/modules/Alumni
          
          # 2. Fix Git ownership and Repair Refs
          git config --global --add safe.directory /root/gibbon-erp/gibbon/modules/Alumni
          rm -rf .git/refs/remotes/origin/main.lock || true
          
          # 3. Force the server to match GitHub exactly 
          git fetch origin main
          git reset --hard FETCH_HEAD
          
          # 4. AUTO-FIX: Move files out of subfolder if nesting is detected
          # This keeps your Repo structure the same but makes Gibbon happy on the server
          if [ -d "Alumni" ]; then
            echo "Nesting detected. Moving files up to module root..."
            mv Alumni/{.,}* . 2>/dev/null || true
            rmdir Alumni || echo "Subfolder already cleared."
          fi
          
          # 5. Clean up non-Gibbon files (Removing development clutter)
          rm -rf package.json package-lock.json tsconfig.json vite.config.ts server.ts components index.html.bak version.php components.json .env.example .gitignore AGENTS.md README.md 
          mkdir -p src css img js
          
          # 6. Set correct ownership and permissions for the Web Container
          docker exec -u root gibbon-web chown -R www-data:www-data /var/www/html/modules/Alumni
          docker exec -u root gibbon-web find /var/www/html/modules/Alumni -type d -exec chmod 755 {} +
          docker exec -u root gibbon-web find /var/www/html/modules/Alumni -type f -name "*.php" -exec chmod 755 {} +
          docker exec -u root gibbon-web chmod 644 /var/www/html/modules/Alumni/manifest.php
          
          # 7. Flush the Gibbon application cache
          docker exec gibbon-web rm -rf /var/www/html/cache/*
          
          # 8. DYNAMIC DB CLEANUP: Find the MySQL container and run commands with password
          # This replaces the hardcoded ID with a flexible name lookup
          MYSQL_CONTAINER=$(docker ps --filter "name=gibbon-mysql" --format "{{.ID}}")
          
          if [ -n "$MYSQL_CONTAINER" ]; then
            echo "Found MySQL container: $MYSQL_CONTAINER. Running database cleanup..."
            
            # Clean up module entry to allow a fresh install
            docker exec "$MYSQL_CONTAINER" mysql -u root -p"${{ secrets.MYSQL_ROOT_PASSWORD }}" -e "DELETE FROM gibbondb.gibbonModule WHERE name = 'Alumni';" || echo "Module DB cleanup failed."
            
            # Nuclear Drop of old tables to prevent installation conflicts
            docker exec "$MYSQL_CONTAINER" mysql -u root -p"${{ secrets.MYSQL_ROOT_PASSWORD }}" -e "DROP TABLE IF EXISTS gibbondb.gibbonAlumni; DROP TABLE IF EXISTS gibbondb.alumniAlumnus;" || echo "Table drop failed."
          else
            echo "Error: Could not find a container named 'gibbon-mysql'. DB steps skipped."
          fi
          
          echo "Alumni Deployment Successful. Ready for fresh install in Gibbon UI."
